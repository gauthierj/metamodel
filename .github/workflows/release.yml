name: Deploy Release

on:
  workflow_dispatch:
    inputs:
      new_develop_version:
        description: 'New development version'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout 'develop'
      uses: actions/checkout@v4
      with:
        ref: develop
    - name: Initialize Git environment
      run: |
        git config --global user.name "Github release action"
        git config --global user.email "<>"
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Import GPG key
      run: |
        echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        gpg --list-secret-keys
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
    - name: Configure Maven servers
      uses: whelk-io/maven-settings-xml-action@v21
      with:
        servers: >
          [
            { "id": "github",  "username": "${{ github.actor }}", "password": "${{ secrets.GITHUB_TOKEN }}" },
            { "id": "central", "username": "${{ secrets.CENTRAL_USERNAME }}", "password": "${{ secrets.CENTRAL_TOKEN }}" }
          ]
    - name: Remove '-SNAPSHOT' on develop
      run: |
        git checkout develop && git pull
        mvn -B versions:set -DremoveSnapshot -DgenerateBackupPoms=false --file pom.xml
        git diff-index --quiet HEAD || git commit -am 'Removed -SNAPSHOT before releasing'
    - name: Merge develop into master
      run: |
        git checkout master && git pull
        git merge develop -Xtheirs -m "Merging develop into master" --allow-unrelated-histories
    - name: Tag master
      run: |
        git tag -a "v$(mvn -B -N help:evaluate -Dexpression=project.version -q -DforceStdout --file pom.xml)" -m "Tagging release version"
    - name: Deploy release to Maven Central
      run: |
        git checkout master
        mvn -B clean deploy -Prelease --file pom.xml
      env:
        MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    - name: Update develop to next snapshot version
      run: |
        git checkout develop
        mvn -B versions:set -DnewVersion=${{ github.event.inputs.new_develop_version }} -DgenerateBackupPoms=false --file pom.xml
        git commit -am "Set new develop version"
    - name: Deploy new snapshot to GitHub Packages
      run: mvn -B clean deploy --file pom.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Push develop and master
      run: |
        git checkout develop && git push
        git checkout master && git push && git push --tags
