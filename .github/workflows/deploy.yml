name: Deploy Snapshot

on:
  push:
    branches: [ "develop" ]
    paths-ignore:
      - .github/workflows/**
      - .mvn/wrapper
      - .gitignore
      - LICENSE
      - README.md
      - mvnw
      - mvnw.cmd
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        server-id: github
        server-username: GITHUB_ACTOR
        server-password: GITHUB_TOKEN
    - name: Deploy snapshot to GitHub Packages
      run: mvn -B clean deploy --file pom.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
